@import "https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap";*,:before,:after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f7f5f0;--surface:#fff;--surface2:#f0ede8;--text:#1a1a1a;--text2:#5a5650;--text3:#8a8680;--accent:#2d5a3d;--accent2:#4a8c5c;--accent-light:#e8f4ec;--orange:#e85d04;--orange-light:#fff0e6;--red:#c62828;--red-light:#fdecea;--blue:#1565c0;--blue-light:#e3f2fd;--yellow:#f57f17;--yellow-light:#fffde7;--border:#00000014;--shadow:0 2px 12px #0000000f;--radius:12px;--radius-sm:8px}body{background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;font-size:14px;line-height:1.6}.nav{background:var(--surface);border-bottom:1px solid var(--border);z-index:100;align-items:center;gap:0;padding:0 24px;display:flex;position:sticky;top:0}.nav-logo{color:var(--accent);white-space:nowrap;align-items:center;gap:8px;margin-right:32px;padding:14px 0;font-family:Syne,sans-serif;font-size:16px;font-weight:800;display:flex}.nav-logo .icon{font-size:18px}.nav-tabs{flex:1;gap:0;display:flex;overflow-x:auto}.nav-tab{color:var(--text2);cursor:pointer;white-space:nowrap;background:0 0;border:none;border-bottom:2px solid #0000;padding:14px 16px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;transition:color .15s,border-color .15s}.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}.main{padding:0}.section{display:none}.section.active{display:block}.hero{background:linear-gradient(135deg,#1a3a25 0%,#2d5a3d 50%,#3d7a53 100%);padding:48px 32px 40px;position:relative;overflow:hidden}.hero:before{content:"";background:#ffffff0a;border-radius:50%;width:300px;height:300px;position:absolute;top:-60px;right:-60px}.hero:after{content:"";background:#ffffff08;border-radius:50%;width:200px;height:200px;position:absolute;bottom:-80px;left:40%}.hero-badge{color:#a8d8b4;background:#ffffff1f;border:1px solid #ffffff26;border-radius:20px;align-items:center;gap:6px;margin-bottom:16px;padding:5px 12px;font-size:11px;font-weight:500;display:inline-flex}.hero h1{color:#fff;margin-bottom:10px;font-family:Syne,sans-serif;font-size:32px;font-weight:800;line-height:1.2}.hero p{color:#ffffffb3;max-width:520px;margin-bottom:28px;font-size:14px}.hero-stats{flex-wrap:wrap;gap:24px;display:flex}.hero-stat{text-align:center}.hero-stat .num{color:#fff;font-family:Syne,sans-serif;font-size:24px;font-weight:700;display:block}.hero-stat .lbl{color:#ffffff8c;font-size:11px}.stats-row{grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 24px 0;display:grid}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}.stat-card .s-label{color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-size:11px;font-weight:500}.stat-card .s-value{color:var(--text);font-family:Syne,sans-serif;font-size:22px;font-weight:700}.stat-card .s-sub{color:var(--text3);margin-top:3px;font-size:11px}.stat-card .s-badge{background:var(--accent-light);color:var(--accent);border-radius:10px;margin-top:4px;padding:2px 8px;font-size:10px;font-weight:600;display:inline-block}.content-grid{grid-template-columns:1fr 1fr;gap:16px;padding:16px 24px;display:grid}.content-grid.triple{grid-template-columns:1fr 1fr 1fr}.content-grid.full{grid-template-columns:1fr}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.card-header{border-bottom:1px solid var(--border);justify-content:space-between;align-items:center;padding:16px 20px 12px;display:flex}.card-header h3{color:var(--text);font-family:Syne,sans-serif;font-size:13px;font-weight:700}.card-header .card-sub{color:var(--text3);margin-top:1px;font-size:11px}.card-body{padding:16px 20px}.badge{border-radius:10px;align-items:center;padding:3px 9px;font-size:10px;font-weight:600;display:inline-flex}.badge-green{background:var(--accent-light);color:var(--accent)}.badge-orange{background:var(--orange-light);color:var(--orange)}.badge-red{background:var(--red-light);color:var(--red)}.badge-blue{background:var(--blue-light);color:var(--blue)}.badge-yellow{background:var(--yellow-light);color:var(--yellow)}.badge-gray{background:var(--surface2);color:var(--text2)}.data-table{border-collapse:collapse;width:100%;font-size:12px}.data-table th{color:var(--text3);text-transform:uppercase;letter-spacing:.4px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);padding:8px 12px;font-size:10px;font-weight:600}.data-table td{color:var(--text);border-bottom:1px solid #0000000a;padding:9px 12px}.data-table tr:last-child td{border-bottom:none}.data-table tr.highlight td{background:#ebf5ee}.data-table tr:hover td{background:var(--surface2)}.chart-wrap{width:100%;position:relative}.section-title{color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:20px 24px 4px;font-family:Syne,sans-serif;font-size:11px;font-weight:700}.model-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);flex-direction:column;gap:10px;padding:14px 16px;display:flex}.model-card .m-name{color:var(--text);font-family:Syne,sans-serif;font-size:13px;font-weight:700}.model-card .m-arch{color:var(--text3);font-family:monospace;font-size:11px}.progress-bar{background:var(--surface2);border-radius:3px;height:6px;overflow:hidden}.progress-fill{border-radius:3px;height:100%;transition:width .5s}.progress-label{color:var(--text3);justify-content:space-between;font-size:10px;display:flex}.scale-visual{border-radius:var(--radius);border:1px solid var(--border);background:linear-gradient(#f5f5f0 0%,#eeeae4 100%);flex-direction:column;align-items:center;gap:12px;padding:24px;display:flex}.scale-platform{background:#c8c4be;border-radius:6px;width:160px;height:12px;position:relative;box-shadow:0 4px 8px #0000001f}.scale-pillar{background:#b8b4ae;border-radius:3px;width:6px;height:40px;margin:0 auto}.scale-base{background:#a8a4a0;border-radius:5px;width:120px;height:10px}.weight-display{color:var(--accent);font-variant-numeric:tabular-nums;font-family:Syne,sans-serif;font-size:36px;font-weight:800}.weight-unit{color:var(--text2);margin-top:-8px;font-size:14px}.result-card{border-radius:var(--radius);border:2px solid;padding:20px}.result-card.confirmed{background:var(--accent-light);border-color:var(--accent2)}.result-card.mismatch{background:var(--orange-light);border-color:var(--orange)}.result-card.low-conf{background:var(--yellow-light);border-color:var(--yellow)}.result-card.unknown{background:var(--red-light);border-color:var(--red)}.result-title{text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:Syne,sans-serif;font-size:11px;font-weight:700}.result-item{margin-bottom:4px;font-family:Syne,sans-serif;font-size:22px;font-weight:800}.result-price{font-family:Syne,sans-serif;font-size:28px;font-weight:700}.img-grid{grid-template-columns:repeat(4,1fr);gap:8px;display:grid}.img-item{aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid var(--border);flex-direction:column;justify-content:center;align-items:center;gap:4px;font-size:32px;display:flex}.img-item span{color:var(--text2);text-transform:uppercase;letter-spacing:.3px;font-size:9px;font-weight:500}.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;padding:32px;transition:border-color .15s,background .15s}.upload-zone:hover{border-color:var(--accent2);background:var(--accent-light)}.upload-icon{margin-bottom:8px;font-size:32px}.upload-text{color:var(--text2);font-size:13px}.upload-hint{color:var(--text3);margin-top:4px;font-size:11px}select,input[type=range]{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);cursor:pointer;width:100%;padding:8px 12px;font-family:DM Sans,sans-serif;font-size:13px}select:focus,input[type=range]:focus{outline:2px solid var(--accent2);outline-offset:2px}.btn{border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.3px;border:none;padding:10px 20px;font-family:Syne,sans-serif;font-size:12px;font-weight:700;transition:opacity .15s,transform .1s}.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.cm-grid{gap:2px;display:grid}.cm-cell{aspect-ratio:1;cursor:default;border-radius:3px;justify-content:center;align-items:center;width:100%;font-size:9px;font-weight:600;display:flex}.conf-bar-row{align-items:center;gap:10px;margin-bottom:10px;display:flex}.conf-bar-label{color:var(--text);min-width:100px;font-size:12px;font-weight:500}.conf-bar-track{background:var(--surface2);border-radius:4px;flex:1;height:20px;position:relative;overflow:hidden}.conf-bar-fill{border-radius:4px;align-items:center;height:100%;padding-left:8px;transition:width .6s cubic-bezier(.34,1.56,.64,1);display:flex}.conf-bar-val{color:#ffffffe6;font-size:11px;font-weight:600}.pipeline-row{border-radius:var(--radius-sm);align-items:center;gap:12px;margin-bottom:4px;padding:10px 12px;display:flex}.pipeline-row:hover{background:var(--surface2)}.pipe-num{color:var(--text3);width:20px;font-family:monospace;font-size:10px}.pipe-item{flex:1.5;font-size:12px;font-weight:500}.pipe-conf{width:46px;color:var(--text2);font-variant-numeric:tabular-nums;font-size:11px}.pipe-weight{width:60px;color:var(--text2);font-variant-numeric:tabular-nums;font-size:11px}.pipe-price{width:60px;color:var(--text);font-variant-numeric:tabular-nums;font-size:12px;font-weight:600}.pipe-status{text-align:right;width:110px}.cat-chip{border-radius:10px;align-items:center;gap:5px;padding:3px 9px;font-size:10px;font-weight:600;display:inline-flex}.cat-fruit{color:#c62828;background:#fdeeee}.cat-veg{color:#2d5a3d;background:#ebf5ee}.cat-pkg{color:#1565c0;background:#e3f2fd}.cat-bakery{color:#f57f17;background:#fffde7}.divider{background:var(--border);height:1px;margin:0 24px}.curve-mini{height:80px;position:relative}.arch-layers{flex-direction:column;gap:4px;display:flex}.arch-layer{border-left:3px solid;border-radius:6px;align-items:center;gap:10px;padding:7px 12px;font-size:11px;display:flex}.arch-layer .l-name{flex:1;font-weight:600}.arch-layer .l-out{color:var(--text3);font-family:monospace;font-size:10px}@media (width<=600px){.stats-row{grid-template-columns:repeat(2,1fr)}.content-grid,.content-grid.triple{grid-template-columns:1fr}.img-grid{grid-template-columns:repeat(2,1fr)}}
